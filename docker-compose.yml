services:
  backend:
    build:
      context: .
      dockerfile: apps/backend/Dockerfile
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - PORT=3000
      - CORS_ORIGIN=http://localhost:5137
    restart: always

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
    ports:
      - "5137:5137"
    environment:
      - NODE_ENV=production
      - PORT=5137
      - HOSTNAME=0.0.0.0
      - FONTCONFIG_PATH=/var/task/fonts
      - VITE_API_BASE_URL=http://localhost:3000
    depends_on:
      - backend
    restart: always
